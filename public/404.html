<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // GitHub Pages SPA HashRouter Redirect handler
      var segment = window.location.pathname.replace(/^\/IntellMeet\/?/, '');
      window.location.replace('/IntellMeet/#' + (segment.charAt(0) === '/' ? '' : '/') + segment + window.location.search + window.location.hash);
    </script>
  </head>
  <body>
    Redirecting to IntellMeet...
  </body>
</html>
